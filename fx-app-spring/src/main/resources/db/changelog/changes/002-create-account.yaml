databaseChangeLog:
  - changeSet:
      id: 002-create-account
      author: fx
      comment: Customer accounts, one currency each.
      changes:
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: owner_name
                  type: VARCHAR(60)
                  constraints: { nullable: false }
              - column:
                  name: currency_code
                  type: CHAR(3)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_account_currency
                    references: currency(code)
              - column:
                  name: balance
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: account_type
                  type: VARCHAR(10)
                  constraints: { nullable: false }
      rollback:
        - dropTable: { tableName: account }